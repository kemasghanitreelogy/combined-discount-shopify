# Rename `app` below to whatever `fly launch` picks or you prefer.
app = "combined-discount"
primary_region = "sin"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  SCOPES = "write_products,write_metaobjects,write_metaobject_definitions,write_discounts"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  # Runs `prisma migrate deploy` before a new release is promoted to serve traffic
  release_command = "npx prisma migrate deploy"
