# fly.toml app configuration file generated for combined-discount-shopify on 2026-04-23T01:08:07Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'combined-discount-shopify'
primary_region = 'sin'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  SCOPES = 'write_products,write_metaobjects,write_metaobject_definitions,write_discounts'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
